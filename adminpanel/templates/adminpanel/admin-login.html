{% load static %}
<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | Skyluxe Elevators Admin</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#c8a45d',
            secondary: '#b38d45',
            background: '#f4efe3',
            surface: '#ffffff',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(200, 164, 93, 0.15), transparent 40%),
        linear-gradient(180deg, #f8f3e8 0%, #f3ecdd 100%);
      overflow-x: hidden;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 50px -12px rgba(119, 90, 38, 0.15);
      border: 1px solid rgba(200, 164, 93, 0.2);
    }
    
    .input-field:focus-within {
      border-color: #c8a45d;
      box-shadow: 0 0 0 4px rgba(200, 164, 93, 0.1);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col relative text-gray-800">

  <!-- FLOATING BG ELEMENTS -->
  <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
    <div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-[rgba(200,164,93,0.12)] blur-3xl rounded-full"></div>
    <div class="absolute -bottom-[20%] -left-[10%] w-[500px] h-[500px] bg-[rgba(179,141,69,0.1)] blur-3xl rounded-full"></div>
  </div>

  <main class="flex-grow flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <!-- LOGO/HEADER -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-primary to-secondary rounded-2xl mb-5 shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined text-white text-[40px]">shield_person</span>
        </div>
        <h1 class="text-3xl font-black text-gray-900 mb-2">Skyluxe Admin</h1>
        <p class="text-gray-500 font-medium">Please verify your credentials to continue.</p>
      </div>

      <!-- FORM CARD -->
      <div class="login-card p-8 rounded-3xl">
        {% if error %}
          <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm font-semibold flex items-center gap-2">
            <span class="material-symbols-outlined text-red-500">error</span>
            {{ error }}
          </div>
        {% endif %}

        <form method="POST" action="/admin/admin-login.html" class="space-y-6">
          {% csrf_token %}

          <!-- Username -->
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Username</label>
            <div class="input-field relative group bg-white border border-gray-200 rounded-xl transition-all duration-300">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors">person</span>
              <input class="w-full pl-12 pr-4 py-3.5 bg-transparent outline-none font-medium text-gray-800 placeholder-gray-400" name="username" placeholder="Enter Username" required type="text" />
            </div>
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Password</label>
            <div class="input-field relative group bg-white border border-gray-200 rounded-xl transition-all duration-300">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary transition-colors">lock</span>
              <input class="w-full pl-12 pr-12 py-3.5 bg-transparent outline-none font-medium text-gray-800 placeholder-gray-400" id="password" name="password" placeholder="Enter Password" required type="password" />
              <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors" onclick="togglePassword()" type="button">
                <span class="material-symbols-outlined" id="eye-icon">visibility</span>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button class="w-full py-4 bg-gradient-to-r from-primary to-secondary text-white font-bold text-lg rounded-xl hover:shadow-lg hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group mt-2" type="submit">
            <span>Secure Login</span>
            <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">login</span>
          </button>
        </form>
      </div>

      <div class="text-center mt-8">
        <a href="/" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors flex items-center justify-center gap-1">
          <span class="material-symbols-outlined text-[18px]">arrow_back</span> Return to Website
        </a>
      </div>
    </div>
  </main>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerText = 'visibility_off';
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerText = 'visibility';
      }
    }
  </script>
</body>
</html>
